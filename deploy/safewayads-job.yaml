apiVersion: batch/v1
kind: Job
metadata:
  name: safewayads-backfill
  labels:
    app: careme
    job: safewayads-backfill
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: careme
        job: safewayads-backfill
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: safewayads-backfill
          image: dockerhub.io/paulgmiller/careme-safewayads:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          args:
            - -start-store=1
            - -end-store=500
            - -delay=1m
            - -resume=true
          envFrom:
            - secretRef:
                name: careme-secrets3
          env:
            - name: SAFEWAYADS_STORAGE_CONTAINER
              value: "safewayads"
            - name: APPLICATIONINSIGHTS_CONNECTION_STRING
              value: "InstrumentationKey=a532fcc7-5098-4f44-8dde-ff2f32d6a59b;IngestionEndpoint=https://westus3-1.in.applicationinsights.azure.com/;LiveEndpoint=https://westus3.livediagnostics.monitor.azure.com/;ApplicationId=fdc94780-6135-4a29-980e-ab114a402e58"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
