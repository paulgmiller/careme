apiVersion: batch/v1
kind: CronJob
metadata:
  name: careme-mail
  labels:
    app: careme-mail
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: careme-mail
            job: careme-mail
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          containers:
            - name: careme-mail
              image: ghcr.io/paulgmiller/careme:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              args: ["-mail"]
              envFrom:
                - secretRef:
                    name: ai
                - secretRef:
                    name: auth
                - secretRef:
                    name: grafana
                - secretRef:
                    name: mail
                - secretRef:
                    name: kroger
                - secretRef:
                    name: storage
                - secretRef:
                    name: walmart
                - secretRef:
                    name: brightdata-proxy
              env:
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: WORKLOAD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.labels['app']
                - name: OTEL_RESOURCE_ATTRIBUTES
                  value: "deployment.environment.name=production,k8s.namespace.name=$(POD_NAMESPACE),k8s.pod.name=$(POD_NAME),k8s.app=$(WORKLOAD_NAME)"
                - name: PUBLIC_ORIGIN
                  value: "${PUBLIC_ORIGIN}"
              resources:
                requests:
                  cpu: 50m
                  memory: 500Mi
                limits:
                  cpu: 500m
                  memory: 750Mi
