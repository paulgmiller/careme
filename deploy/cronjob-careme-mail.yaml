apiVersion: batch/v1
kind: CronJob
metadata:
  name: careme-mail
  labels:
    app: careme-mail
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: careme-mail
            job: careme-mail
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          containers:
            - name: careme-mail
              image: ghcr.io/paulgmiller/careme:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              args: ["-mail"]
              envFrom:
                - secretRef:
                    name: ai
                - secretRef:
                    name: auth
                - secretRef:
                    name: mail
                - secretRef:
                    name: kroger
                - secretRef:
                    name: storage
                - secretRef:
                    name: walmart
              env:
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: grafana
                      key: OTEL_EXPORTER_OTLP_ENDPOINT
                - name: OTEL_EXPORTER_OTLP_HEADERS
                  valueFrom:
                    secretKeyRef:
                      name: grafana
                      key: OTEL_EXPORTER_OTLP_HEADERS
                - name: PUBLIC_ORIGIN
                  value: "https://careme.cooking"
              resources:
                requests:
                  cpu: 50m
                  memory: 500Mi
                limits:
                  cpu: 500m
                  memory: 750Mi
