apiVersion: batch/v1
kind: CronJob
metadata:
  name: careme-mail
  labels:
    app: careme
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: careme
            job: careme-mail
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          containers:
            - name: careme-mail
              image: ghcr.io/paulgmiller/careme:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              args: ["-mail"]
              envFrom:
                - secretRef:
                    name: careme-secrets3
              env:
                - name: APPLICATIONINSIGHTS_CONNECTION_STRING
                  value: "InstrumentationKey=a532fcc7-5098-4f44-8dde-ff2f32d6a59b;IngestionEndpoint=https://westus3-1.in.applicationinsights.azure.com/;LiveEndpoint=https://westus3.livediagnostics.monitor.azure.com/;ApplicationId=fdc94780-6135-4a29-980e-ab114a402e58"
                - name: PUBLIC_ORIGIN
                  value: "https://careme.cooking"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
