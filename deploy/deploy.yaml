apiVersion: apps/v1
kind: Deployment
metadata:
  name: careme
  labels:
    app: careme
spec:
  replicas: 2
  selector:
    matchLabels:
      app: careme
  template:
    metadata:
      labels:
        app: careme
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: careme
          image: ghcr.io/paulgmiller/careme:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - secretRef:
                name: ai
            - secretRef:
                name: albertsons
            - secretRef:
                name: auth
            - secretRef:
                name: brightdata-proxy
            - secretRef:
                name: kroger
            - secretRef:
                name: storage
            - secretRef:
                name: walmart
          env:
            - name: CLARITY_PROJECT_ID
              value: "td2gxd3sq9"
            - name: GOOGLE_TAG_ID
              value: "AW-17902827663"
            - name: GOOGLE_CONVERSION_LABEL
              value: "xDzACMu074AcEI_x3dhC"
            - name: ADMIN_EMAILS
              value: "paul.miller@gmail.com"
            - name: PUBLIC_ORIGIN
              value: "https://careme.cooking"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"

          volumeMounts:
            - name: recipes
              mountPath: /recipes
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 1
            periodSeconds: 5
            timeoutSeconds: 3 #first call has to get outh token (should we do a startup probe?)
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3 #first call has to get outh token
          resources:
            requests:
              cpu: 50m
              memory: 500Mi
            limits:
              cpu: 500m
              memory: 750Mi
      volumes:
        - name: recipes
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: careme
  labels:
    app: careme
spec:
  type: ClusterIP
  selector:
    app: careme
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: careme
  labels:
    app: careme
  annotations:
    # Uncomment and adjust if using cert-manager for TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  rules:
    - host: careme.northbriton.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: careme
                port:
                  number: 80
    - host: careme.cooking
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: careme
                port:
                  number: 80
  # Uncomment TLS section after DNS points to ingress controller and certificate issuer is set up
  # tls:
  #   - hosts:
  #       - careme.northbrion.net
  #     secretName: careme-tls
