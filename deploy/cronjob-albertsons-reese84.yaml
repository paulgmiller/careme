apiVersion: batch/v1
kind: CronJob
metadata:
  name: albertsons-reese84
  labels:
    app: albertsons-reese84
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 6 # keep trying to get that token
      template:
        metadata:
          labels:
            app: albertsons-reese84
            job: albertsons-reese84
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          containers:
            - name: albertsons-reese84
              image: ghcr.io/paulgmiller/careme-albertsonsreese84:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: storage
                - secretRef:
                    name: brightdata-proxy
              env:
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: "http://otel-collector:4318"
              args: ["wait-ms", "10000"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
