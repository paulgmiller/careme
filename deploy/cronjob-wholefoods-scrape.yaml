apiVersion: batch/v1
kind: CronJob
metadata:
  name: wholefoods-scrape
  labels:
    app: wholefoods-scrape
spec:
  schedule: "0 6 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: wholefoods-scrape
            job: wholefoods-scrape
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          containers:
            - name: wholefoods
              image: ghcr.io/paulgmiller/careme-wholefoods:${IMAGE_TAG}
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: storage
              env:
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: "http://otel-collector:4318"
                - name: OTEL_EXPORTER_OTLP_INSECURE
                  value: "true"
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
