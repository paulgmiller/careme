<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Careme Offline</title>
  <meta name="theme-color" content="#c2410c" />
  <style>
    :root {
      color-scheme: light;
      font-family: Georgia, "Times New Roman", serif;
      background: #fffdf8;
      color: #3e3529;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #f3ebd9 0, #fffdf8 45%),
        linear-gradient(180deg, #fffdf8, #f7f1e6);
      padding: 24px;
    }

    main {
      max-width: 32rem;
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #eadfc9;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(62, 53, 41, 0.08);
      padding: 32px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      line-height: 1.1;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.6;
    }

    a {
      color: #7a4f22;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>Careme needs a connection.</h1>
    <p>You can still reopen anything your browser has already saved, but fresh recipes and sign-in need the internet.</p>
    <p>Try again in a moment, chef.</p>
    <p><a href="/">Back home</a></p>
  </main>
</body>
</html>
