<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Careme Offline</title>
  <meta name="theme-color" content="{{.ThemeColor}}" />
  <style>
    :root {
      --brand-50: {{.Colors.C50}};
      --brand-100: {{.Colors.C100}};
      --brand-200: {{.Colors.C200}};
      --brand-300: {{.Colors.C300}};
      --brand-400: {{.Colors.C400}};
      --brand-500: {{.Colors.C500}};
      --brand-600: {{.Colors.C600}};
      --brand-700: {{.Colors.C700}};
      --brand-800: {{.Colors.C800}};
      --brand-900: {{.Colors.C900}};
    }
  </style>
  <link rel="stylesheet" href="{{.TailwindAssetPath}}" />
</head>
<body class="grid min-h-screen place-items-center bg-gradient-to-b from-brand-50 to-white px-6 text-ink-700 antialiased">
  <main class="friendly-card w-full max-w-2xl border border-brand-100 bg-white/90 p-8 shadow-xl sm:p-10">
    <h1 class="text-3xl font-extrabold tracking-tight text-brand-700 sm:text-4xl">Careme needs a connection.</h1>
    <p class="mt-3 text-base leading-7 text-ink-600">You can still reopen anything your browser has already saved, but fresh recipes and sign-in need the internet.</p>
    <p class="mt-2 text-base leading-7 text-ink-600">Try again in a moment, chef.</p>
    <section class="mt-8 hidden" data-offline-recipes-section>
      <h2 class="text-lg font-bold text-ink-800">Saved recipes on this device</h2>
      <ul class="mt-3 divide-y divide-brand-100 overflow-hidden rounded-lg border border-brand-100 bg-white" data-offline-recipes-list></ul>
    </section>
    <p class="mt-6">
      <a href="/" class="inline-flex items-center justify-center rounded-lg border border-brand-300 bg-white px-4 py-2.5 text-sm font-semibold text-brand-700 shadow-sm transition hover:bg-brand-50 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2">Back home</a>
    </p>
  </main>
  <script>
    (() => {
      const savedRecipesCacheName = "careme-saved-recipes-v1";
      const savedRecipesListURL = "/user/recipes/offline-cache";
      const section = document.querySelector("[data-offline-recipes-section]");
      const list = document.querySelector("[data-offline-recipes-list]");

      if (!section || !list || !("caches" in window)) {
        return;
      }

      const titleFromResponse = async (response) => {
        if (!response) {
          return "";
        }
        try {
          const html = await response.clone().text();
          const doc = new DOMParser().parseFromString(html, "text/html");
          // TODO: Cache recipe titles separately so the offline page does not
          // need to parse cached HTML just to label these links.
          return doc.title.trim();
        } catch {
          return "";
        }
      };

      const recipeURLsFromList = async (cache) => {
        const cachedList = await cache.match(savedRecipesListURL);
        if (!cachedList) {
          return [];
        }
        const body = await cachedList.text();
        return body.split(/\r?\n/).filter(Boolean);
      };

      const renderRecipeLinks = async () => {
        const cache = await caches.open(savedRecipesCacheName);
        const recipeURLs = await recipeURLsFromList(cache);

        if (!recipeURLs.length) {
          return;
        }

        const uniqueURLs = [...new Set(recipeURLs)];
        const rows = await Promise.all(uniqueURLs.map(async (href) => {
          const response = await cache.match(href);
          const title = await titleFromResponse(response);
          const item = document.createElement("li");
          const anchor = document.createElement("a");

          anchor.href = href;
          anchor.className = "block px-4 py-3 text-sm font-semibold text-brand-700 hover:bg-brand-50 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-inset";
          anchor.textContent = title || href;
          item.append(anchor);
          return item;
        }));

        list.replaceChildren(...rows);
        section.classList.remove("hidden");
      };

      renderRecipeLinks().catch(() => {});
    })();
  </script>
</body>
</html>
