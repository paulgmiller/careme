{{define "location_request_store"}}
<form
  method="POST"
  action="/locations/request-store"
  hx-post="/locations/request-store"
  hx-swap="outerHTML">
  <input type="hidden" name="store_id" value="{{.ID}}" />
  <button type="submit"
    class="rounded-lg border border-brand-300 bg-white px-3 py-2 text-sm font-semibold text-brand-700 shadow-sm transition hover:bg-brand-50 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2">
    Request this store
  </button>
</form>
{{end}}

{{define "location_request_store_success"}}
<div aria-live="polite"
  class="inline-flex items-center justify-center rounded-lg border border-brand-200 bg-brand-50 px-3 py-2 text-sm font-semibold text-brand-700">
  Request sent
</div>
{{end}}
