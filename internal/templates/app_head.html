{{define "app_head"}}
{{template "tailwind_head" .}}
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="{{.Colors.C600}}">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Careme">
<link rel="apple-touch-icon" href="/static/app-icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/static/app-icon-192.png">
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    });
  }
</script>
{{end}}
