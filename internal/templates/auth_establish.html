<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signing In</title>
    {{.GoogleTagScript}}
  </head>
  <body data-return-to="{{.ReturnTo}}">
    <script
      crossorigin="anonymous"
      data-clerk-publishable-key="{{.PublishableKey}}"
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
    <script>
      Clerk.load().then(() => {
        // Just loading Clerk on your domain is often enough to finalize cookies in dev.
        const url = new URL(location.href);
        url.searchParams.delete("__clerk_db_jwt");
        history.replaceState({}, "", url.toString());

        const returnTo = document.body.dataset.returnTo || "/";
        const finishRedirect = () => location.replace(returnTo);

        if ({{.Signup}} &&
            "{{.GoogleConversionTag}}" !== "" &&
            typeof gtag === "function") {
          gtag("event", "conversion", {
            send_to: "{{.GoogleConversionTag}}",
            event_callback: finishRedirect,
          });
          setTimeout(finishRedirect, 1500);
          return;
        }

        finishRedirect();
      });
    </script>
  </body>
</html>
