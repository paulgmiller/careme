<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signing In</title>
    {{.GoogleTagScript}}
  </head>
  <body>
    <script
      crossorigin="anonymous"
      data-clerk-publishable-key="{{.PublishableKey}}"
      src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>
    <script>
      Clerk.load().then(() => {
        // Just loading Clerk on your domain is often enough to finalize cookies in dev.
        const url = new URL(location.href);
        url.searchParams.delete("__clerk_db_jwt");
        history.replaceState({}, "", url.toString());

        const returnTo = "{{.ReturnTo}}" || "/";
        const userExistsURL = "{{.UserExistsURL}}";
        const finishRedirect = () => location.replace(returnTo);

        const checkUserExists = async () => {
          const response = await fetch(userExistsURL, {
            method: "GET",
            credentials: "same-origin",
            headers: {
              "Accept": "application/json",
            },
          });
          if (!response.ok) {
            console.warn(`auth user exists failed: ${response.status}`);
            return { exists: true };
          }
          return response.json();
        };

        checkUserExists().then((payload) => {
          if (!payload.exists &&
              "{{.GoogleConversionTag}}" !== "" &&
              typeof gtag === "function") {
            gtag("event", "conversion", {
              send_to: "{{.GoogleConversionTag}}",
              event_callback: finishRedirect,
            });
            setTimeout(finishRedirect, 1500);
            return;
          }
          finishRedirect();
        });
      });
    </script>
  </body>
</html>
