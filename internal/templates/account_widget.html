{{define "account_widget"}}
<div class="flex items-center justify-end">
  {{if .User}}
  <details class="relative">
    <summary aria-label="Account menu" class="flex h-11 w-11 cursor-pointer list-none items-center justify-center rounded-full border border-brand-100 bg-white text-sm font-bold text-brand-700 shadow-sm transition hover:bg-brand-50 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2 sm:h-auto sm:w-auto sm:gap-2 sm:px-4 sm:py-2 sm:font-medium">
      <span class="sm:hidden">{{UserInitial .User.Email}}</span>
      <span class="hidden max-w-[14rem] truncate sm:block">{{index .User.Email 0}}</span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="hidden h-4 w-4 shrink-0 sm:block">
        <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.168l3.71-3.938a.75.75 0 1 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06Z" clip-rule="evenodd" />
      </svg>
    </summary>
    <div class="absolute right-0 z-10 mt-2 w-48 rounded-xl border border-gray-200 bg-white p-2 shadow-lg">
      <a href="/user" class="block rounded-lg px-3 py-2 text-sm text-ink-700 transition hover:bg-brand-50">View profile</a>
      <form method="POST" action="/logout">
        <button type="submit" class="w-full rounded-lg px-3 py-2 text-left text-sm text-action-red-600 transition hover:bg-action-red-50">Sign out</button>
      </form>
    </div>
  </details>
  {{else}}
  <a href="{{SignInPath .AuthReturnTo}}"
     class="inline-flex items-center justify-center rounded-full border border-brand-100 bg-white px-4 py-2 text-sm font-semibold text-brand-700 shadow-sm transition hover:bg-brand-50 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2">
    Sign in
  </a>
  {{end}}
</div>
{{end}}
