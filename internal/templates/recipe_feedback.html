{{define "recipe_feedback_button"}}
<button type="button"
        id="{{.FeedbackWidgetID}}-button"
        hx-post="/recipe/{{.RecipeHash}}/feedback"
        hx-vals='{"cooked":"true"}'
        hx-swap="none"
        hx-disabled-elt="#{{.FeedbackWidgetID}}-button"
        onclick="document.getElementById('{{.FeedbackWidgetID}}-panel').classList.remove('hidden'); document.getElementById('{{.FeedbackWidgetID}}-status').textContent='';"
        class="inline-flex items-center justify-center rounded-lg border border-brand-300 bg-white px-4 py-2.5 text-sm font-semibold text-brand-700 shadow-sm transition hover:border-brand-400 hover:bg-brand-50 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2 disabled:cursor-not-allowed disabled:text-brand-400">
  {{if .Feedback.Cooked}}Update feedback{{else}}I cooked it!{{end}}
</button>
{{end}}

{{define "recipe_feedback_panel"}}
<div id="{{.FeedbackWidgetID}}-panel" class="{{if not .Feedback.Cooked}}hidden {{end}}space-y-3 rounded-xl border border-brand-100 bg-brand-50/70 p-4">
  <h4 class="text-sm font-semibold uppercase tracking-wide text-gray-500">Cooked It?</h4>
  <form method="POST"
        action="/recipe/{{.RecipeHash}}/feedback"
        hx-post="/recipe/{{.RecipeHash}}/feedback"
        hx-target="#{{.FeedbackWidgetID}}-status"
        hx-swap="innerHTML"
        hx-on::before-request="document.getElementById('{{.FeedbackWidgetID}}-submit').textContent='Saving...';"
        hx-on::after-request="document.getElementById('{{.FeedbackWidgetID}}-submit').textContent='Save feedback';"
        class="space-y-3">
    <input type="hidden" name="cooked" value="true" />
    <div class="space-y-1">
      <p class="text-sm font-medium text-gray-700">Rating</p>
      <div data-star-rating
           data-initial-stars="{{.Feedback.Stars}}"
           data-input-id="{{.FeedbackWidgetID}}-stars"
           class="inline-flex items-center gap-1"
           role="radiogroup"
           aria-label="Recipe rating">
        <button type="button" data-star="1" class="star-button text-2xl leading-none text-gray-300 transition hover:text-amber-500 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2" aria-label="1 star">☆</button>
        <button type="button" data-star="2" class="star-button text-2xl leading-none text-gray-300 transition hover:text-amber-500 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2" aria-label="2 stars">☆</button>
        <button type="button" data-star="3" class="star-button text-2xl leading-none text-gray-300 transition hover:text-amber-500 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2" aria-label="3 stars">☆</button>
        <button type="button" data-star="4" class="star-button text-2xl leading-none text-gray-300 transition hover:text-amber-500 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2" aria-label="4 stars">☆</button>
        <button type="button" data-star="5" class="star-button text-2xl leading-none text-gray-300 transition hover:text-amber-500 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2" aria-label="5 stars">☆</button>
      </div>
      <input id="{{.FeedbackWidgetID}}-stars" type="hidden" name="stars" value="{{if gt .Feedback.Stars 0}}{{.Feedback.Stars}}{{end}}" />
    </div>
    <label for="{{.FeedbackWidgetID}}-feedback" class="block text-sm font-medium text-gray-700">Notes</label>
    <textarea id="{{.FeedbackWidgetID}}-feedback"
              name="feedback"
              rows="3"
              placeholder="What worked well or what would you change?"
              class="w-full rounded-lg border border-gray-300 bg-white px-3 py-2 text-gray-900 shadow-sm focus:border-brand-500 focus:outline-none focus:ring-2 focus:ring-brand-400">{{.Feedback.Comment}}</textarea>
    <div class="flex items-center gap-3">
      <button type="submit"
              id="{{.FeedbackWidgetID}}-submit"
              class="inline-flex items-center justify-center rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white shadow-md transition hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-400 focus:ring-offset-2">
        Save feedback
      </button>
      <span id="{{.FeedbackWidgetID}}-status" class="text-sm font-medium text-green-700" aria-live="polite"></span>
    </div>
  </form>
</div>
{{end}}

{{define "recipe_feedback_widget"}}
<div class="space-y-3">
  <div class="flex flex-wrap items-center gap-3">
    {{template "recipe_feedback_button" .}}
  </div>
  {{template "recipe_feedback_panel" .}}
</div>
{{end}}

{{define "recipe_feedback_script"}}
<script>
  function renderRecipeFeedbackStars(rating, selectedStars) {
    const selected = Number(selectedStars) || 0;
    rating.querySelectorAll('[data-star]').forEach((button) => {
      const value = Number(button.dataset.star || 0);
      const filled = value <= selected;
      button.textContent = filled ? '★' : '☆';
      button.classList.toggle('text-amber-500', filled);
      button.classList.toggle('text-gray-300', !filled);
    });
  }

  function initRecipeFeedbackRatings(root) {
    const scope = root && root.querySelectorAll ? root : document;
    scope.querySelectorAll('[data-star-rating]').forEach((rating) => {
      if (rating.dataset.initialized === 'true') {
        return;
      }
      const inputId = rating.dataset.inputId;
      const input = inputId ? document.getElementById(inputId) : null;
      if (!input) {
        return;
      }

      rating.dataset.initialized = 'true';
      const initial = Number(rating.dataset.initialStars || input.value || 0);
      if (initial > 0) {
        input.value = String(initial);
      }
      renderRecipeFeedbackStars(rating, initial);

      rating.querySelectorAll('[data-star]').forEach((button) => {
        button.addEventListener('click', function () {
          const stars = Number(button.dataset.star || 0);
          input.value = stars > 0 ? String(stars) : '';
          renderRecipeFeedbackStars(rating, stars);
        });
      });
    });
  }

  document.addEventListener('DOMContentLoaded', function () {
    initRecipeFeedbackRatings(document);
  });

  document.body.addEventListener('htmx:afterSettle', function (event) {
    initRecipeFeedbackRatings(event.target);
  });
</script>
{{end}}
