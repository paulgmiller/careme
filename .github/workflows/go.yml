# .github/workflows/ghcr-publish-pr-gate.yml
name: Build and Publish

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/master' }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  vet:
    name: vet
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

  format:
    name: format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gofumpt
        run: bash tools/install.sh gofumpt

      - name: Check Go formatting
        run: test -z "$(./bin/gofumpt -l .)"

  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Read tool versions
        id: tool-versions
        run: |
          source tools/versions.sh
          echo "golangci-lint=${GOLANGCI_LINT_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ steps.tool-versions.outputs.golangci-lint }}
          args: --timeout=5m

  js-lint:
    name: js-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run JavaScript lint
        run: npm exec --yes --package eslint@10.4.0 -- eslint internal/static/user-clerk-billing.js internal/static/share.js

  k8s-lint:
    name: k8s-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kubeconform
        run: bash tools/install.sh kubeconform

      - name: Validate Kubernetes manifests
        run: ./bin/kubeconform -strict -summary deploy/*.yaml

  publish:
    name: publish (${{ matrix.name }})
    needs: [verify, vet, format, lint, js-lint, k8s-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: careme
            cmd_path: ./cmd/careme
            image_suffix: ""
          - name: wholefoods
            cmd_path: ./cmd/wholefoods
            image_suffix: wholefoods
          - name: albertsons
            cmd_path: ./cmd/albertsons
            image_suffix: albertsons
          - name: publix
            cmd_path: ./cmd/publix
            image_suffix: publix
          - name: aldi
            cmd_path: ./cmd/aldi
            image_suffix: aldi
          - name: reese84
            cmd_path: ./cmd/reese84
            image_suffix: reese84
          - name: publixabck
            cmd_path: ./cmd/publixabck
            image_suffix: publixabck

    steps:
      - uses: actions/checkout@v5

      - name: Derive image name & tags
        id: vars
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO_LC=$(echo "${GITHUB_REPOSITORY#*/}"       | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER_LC}/${REPO_LC}"
          if [ -n "${{ matrix.image_suffix }}" ]; then
            IMAGE="${IMAGE}-${{ matrix.image_suffix }}"
          fi
          echo "IMAGE=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}"           >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) or Build & Push (branch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          build-args: |
            CMD_PATH=${{ matrix.cmd_path }}
          tags: |
            ${{ steps.vars.outputs.IMAGE }}:latest
            ${{ steps.vars.outputs.IMAGE }}:${{ steps.vars.outputs.SHORT_SHA }}

  deploy-caremetest:
    name: deploy caremetest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: caremetest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Install deploy dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          CAREMETEST_KUBECONFIG: ${{ secrets.CAREMETEST_KUBECONFIG }}
          CAREMETEST_KUBECONFIG_B64: ${{ secrets.CAREMETEST_KUBECONFIG_B64 }}
        run: |
          mkdir -p "$HOME/.kube"
          if [ -n "$CAREMETEST_KUBECONFIG_B64" ]; then
            printf '%s' "$CAREMETEST_KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          elif [ -n "$CAREMETEST_KUBECONFIG" ]; then
            printf '%s' "$CAREMETEST_KUBECONFIG" > "$HOME/.kube/config"
          else
            echo "Set CAREMETEST_KUBECONFIG_B64 or CAREMETEST_KUBECONFIG in GitHub Actions secrets." >&2
            exit 1
          fi
          chmod 600 "$HOME/.kube/config"

      - name: Deploy to caremetest
        run: bash deploy/deploy.sh "$GITHUB_SHA" caremetest
