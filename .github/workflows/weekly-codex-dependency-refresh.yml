name: Weekly Codex Dependency Refresh

on:
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-codex-dependency-refresh
  cancel-in-progress: false

jobs:
  dependency-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/prompts/weekly-dependency-refresh.md
          sandbox: danger-full-access
          safety-strategy: drop-sudo

      - name: Verify Go tests
        env:
          ENABLE_MOCKS: "1"
        run: go test ./...

      - name: Verify Docker build
        run: docker build -t careme-deps-check .

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/weekly-dependency-refresh
          delete-branch: true
          commit-message: "chore: refresh Go and Docker dependencies"
          title: "chore: refresh Go and Docker dependencies"
          body: |
            Automated weekly dependency refresh generated by Codex.

            Scope:
            - Go module updates in `go.mod` and `go.sum`
            - Root `Dockerfile` base image updates when safe

            Verification:
            - `go test ./...`
            - `docker build -t careme-deps-check .`
